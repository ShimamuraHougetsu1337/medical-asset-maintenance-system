apiVersion: v1
kind: ConfigMap
metadata:
  name: medical-system-config
  namespace: medical-system
data:
  mysql-database: medical_system
  spring-datasource-url: jdbc:mysql://mysql:3306/medical_system?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
  backend-api-url: http://backend:8080/api
  public-api-url: /api
