apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medical-system
  namespace: medical-system
spec:
  ingressClassName: nginx
  rules:
    - host: medical.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
